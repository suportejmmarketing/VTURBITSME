services:
  vturb:
    build: .
    container_name: vturb-self
    restart: unless-stopped
    expose:
      - "4000"              # porta interna; o Traefik recebe 80/443 e repassa pra ca
    environment:
      PUBLIC_URL: "https://video.pagmentoprotegido.shop"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-MudeEssaSenha123}"
      MAX_UPLOAD_MB: "2000"
    volumes:
      - ./data:/app/data    # videos e banco persistem aqui (fora do container)
      - ./src:/app/src      # CODIGO montado do host -> update sem rebuild (cp + restart aplica na hora)
      - ./public:/app/public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vturb.rule=Host(`video.pagmentoprotegido.shop`)"
      - "traefik.http.routers.vturb.entrypoints=websecure"
      - "traefik.http.routers.vturb.tls.certresolver=letsencrypt"
      - "traefik.http.services.vturb.loadbalancer.server.port=4000"
